<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ULTRAS – Home</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="logo-row">
        <div class="logo-mark">U</div>
        <div class="badge">Football reviews</div>
      </div>

      <div class="title-block">
        <h1>ULTRAS</h1>
        <p>A football rating and reviewing platform for fans who actually watch the game.</p>
      </div>

      <div class="hero-placeholder">
        <span>Match feed / hero visual</span>
      </div>

      <div class="cta-block">
        <button class="primary-btn">
          <span class="icon">⚽</span>
          <span>Sign in to rate matches</span>
        </button>
        <p class="secondary-text">
          New here? <strong>Browse matches first</strong> — no account required.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
